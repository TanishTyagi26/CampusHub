{% extends "base.html" %}

{% block title %}Notes{% endblock %}

{% block content %}

<div class="container">

<h1>All Notes</h1>

<table border="1" cellpadding="10">

<tr>

<th>ID</th>
<th>Title</th>
<th>Subject</th>
<th>File</th>
<th>Uploaded By</th>
<th>Action</th>

</tr>

{% for note in notes %}

<tr>

<td>{{ note[0] }}</td>
<td>{{ note[1] }}</td>
<td>{{ note[2] }}</td>
<td>{{ note[3] }}</td>
<td>{{ note[4] }}</td>

<td>

<a href="/student/download/{{ note[3] }}">
Download
</a>

|

<a href="/admin/delete_note/{{ note[0] }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/admin/dashboard">
<button>Back</button>
</a>

</div>

{% endblock %}
