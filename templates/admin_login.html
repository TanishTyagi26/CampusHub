{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}

<section class="login-container">

    <h1>Admin Login</h1>

    <form action="/admin" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</section>

{% endblock %}
