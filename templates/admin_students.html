{% extends "base.html" %}

{% block title %}Manage Students{% endblock %}

{% block content %}

<div class="container">

    <h1>👨‍🎓 Manage Students</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Branch</th>
            <th>Year</th>
            <th>Action</th>
        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[4] }}</td>
            <td>{{ student[5] }}</td>

            <td>

                <a href="/admin/delete_student/{{ student[0] }}"
                   onclick="return confirm('Are you sure you want to delete this student?')">

                    <button>
                        <i class="fa-solid fa-trash"></i>
                        Delete
                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/admin/dashboard">

        <button>

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </button>

    </a>

</div>

{% endblock %}
