{% extends "base.html" %}

{% block title %}Faculty Dashboard{% endblock %}

{% block content %}

<div class="container">

    <h1>Welcome {{ faculty_name }} 👋</h1>
    <h2>Faculty Dashboard</h2>

    <hr>

    <div class="dashboard-cards">

        <div class="card">
            <h3>Total Notes</h3>
            <h1>{{ notes_count }}</h1>
        </div>

        <div class="card">
            <h3>Announcements</h3>
            <h1>{{ announcement_count }}</h1>
        </div>

    </div>

    <hr>

    <h3>Quick Actions</h3>

    <a href="/faculty/upload">
        <button>📤 Upload Notes</button>
    </a>

    <a href="/faculty/notes">
        <button>📚 Manage Notes</button>
    </a>

    <a href="/faculty/announcements">
        <button>📢 Manage Announcements</button>
    </a>

    <a href="/faculty/logout">
        <button>🚪 Logout</button>
    </a>

</div>

{% endblock %}
