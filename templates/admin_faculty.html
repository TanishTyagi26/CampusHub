{% extends "base.html" %}

{% block title %}Manage Faculty{% endblock %}

{% block content %}

<div class="container">

    <h1>👨‍🏫 Manage Faculty</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Action</th>
        </tr>

        {% for teacher in faculty %}

        <tr>

            <td>{{ teacher[0] }}</td>
            <td>{{ teacher[1] }}</td>
            <td>{{ teacher[2] }}</td>
            <td>{{ teacher[4] }}</td>

            <td>

                <a href="/admin/delete_faculty/{{ teacher[0] }}"
                   onclick="return confirm('Are you sure you want to delete this faculty member?')">

                    <button>
                        <i class="fa-solid fa-trash"></i>
                        Delete
                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/admin/dashboard">

        <button>

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </button>

    </a>

</div>

{% endblock %}
