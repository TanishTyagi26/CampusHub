{% extends "base.html" %}

{% block title %}
{{ role }} Login
{% endblock %}

{% block content %}

<section class="login-container">

    <h1>{{ role }} Login</h1>

    <form>

        <input type="text" placeholder="Username">

        <input type="password" placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

</section>

{% endblock %}
