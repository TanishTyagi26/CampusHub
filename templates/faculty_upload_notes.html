{% extends "base.html" %}

{% block title %}Upload Notes{% endblock %}

{% block content %}

<div class="container">

    <h1>Upload Notes</h1>

    <form action="/faculty/upload"
          method="POST"
          enctype="multipart/form-data">

        <input
            type="text"
            name="title"
            placeholder="Title"
            required>

        <br><br>

        <input
            type="text"
            name="subject"
            placeholder="Subject"
            required>

        <br><br>

        <input
            type="file"
            name="file"
            required>

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

</div>

{% endblock %}
