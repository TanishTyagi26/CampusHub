{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}

<div class="container">

    <h1>Admin Dashboard 👨‍💼</h1>

    <hr>

    <div class="dashboard-cards">

        <div class="card">
            <h3>Total Students</h3>
            <h1>{{ students }}</h1>
        </div>

        <div class="card">
            <h3>Total Faculty</h3>
            <h1>{{ faculty }}</h1>
        </div>

        <div class="card">
            <h3>Total Notes</h3>
            <h1>{{ notes }}</h1>
        </div>

        <div class="card">
            <h3>Announcements</h3>
            <h1>{{ announcements }}</h1>
        </div>

    </div>

    <hr>

    <h3>Management</h3>

    <a href="/admin/students"><button>Manage Students</button></a>

    <a href="/admin/faculty"><button>Manage Faculty</button></a>

    <a href="/admin/notes"><button>Manage Notes</button></a>

    <a href="/admin/announcements"><button>Announcements</button></a>

    <a href="/admin/logout"><button>Logout</button></a>

</div>

{% endblock %}
