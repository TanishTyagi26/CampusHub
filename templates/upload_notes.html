{% extends "base.html" %}

{% block title %}Upload Notes{% endblock %}

{% block content %}

<h1>Upload Notes</h1>

<form action="/student/upload" method="POST" enctype="multipart/form-data">

    <input type="text"
           name="title"
           placeholder="Title"
           required>

    <input type="text"
           name="subject"
           placeholder="Subject"
           required>

    <input type="file"
           name="file"
           required>

    <button type="submit">
        Upload
    </button>

</form>

{% endblock %}
